# Für lokales Testen oder eine Coolify "Docker Compose"-Deployment.
# Reverse-Proxy + TLS macht Coolify selbst – hier KEIN Caddy/Traefik nötig.
services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    # Coolify routet seinen Proxy auf diesen Port (in der UI als
    # "Ports Exposes" = 8080 eintragen). Lokal ggf. ports: ["8080:8080"].
    expose:
      - "8080"
